; DXSpotter — ESP32-S3 DX/Solar/HamAlert viewer for LilyGo T-Deck Plus
; Copyright 2026 DXSpotter Contributors
; SPDX-License-Identifier: GPL-3.0-or-later
;
; Platform:  ESP32-S3 (T-Deck / T-Deck Plus)
; Framework: Arduino
; Display:   ST7789 320x240 IPS
; Radio:     WiFi only (BT and LoRa disabled)

[env:t-deck]
platform  = espressif32
board     = esp32-s3-devkitm-1
framework = arduino

; ── Flash & partition layout ──────────────────────────────────────────
board_build.flash_size    = 16MB
board_build.flash_mode    = dio
board_build.partitions    = partitions.csv
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216

; ── CPU & PSRAM ──────────────────────────────────────────────────────
board_build.f_cpu       = 240000000L
board_build.arduino.memory_type = qio_opi
build_flags =
  -DARDUINO_ESP32S3_DEV
  -DBOARD_HAS_PSRAM=1
  -DPSRAM=opi
  -DPSRAM_MODE=octal
  -DPSRAM_SIZE=8388608
  -DCONFIG_SPIRAM_USE_MALLOC=1
  -DCONFIG_ESP32S3_SPIRAM_SUPPORT=1

; ── USB CDC ──────────────────────────────────────────────────────────
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1

; ── DXSpotter build flags ─────────────────────────────────────────────
  -DDXS_VERSION=\"0.1.0\"
  -DDXS_PLATFORM_TDECK=1
  -DDXS_SCREEN_W=320
  -DDXS_SCREEN_H=240

; ── Display driver (ST7789 via SPI) ──────────────────────────────────
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DUSE_FSPI_PORT
  -DTFT_INVERT_COLORS
  -DTFT_WIDTH=320
  -DTFT_HEIGHT=240
  -DDXS_TFT_WIDTH=320
  -DDXS_TFT_HEIGHT=240
  -DCGRAM_OFFSET=1
  -DTFT_CS=12
  -DTFT_DC=11
  -DTFT_RST=-1
  -DTFT_BL=42
  -DTFT_MOSI=41
  -DTFT_MISO=38
  -DTFT_SCLK=40
  -DLOAD_GLCD=1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=6000000

; ── Debug serial ─────────────────────────────────────────────────────
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_HAS_USB_SERIAL=1

; ── LVGL config ──────────────────────────────────────────────────────
  -DLV_CONF_INCLUDE_SIMPLE
  -I lib

; ── Arduino loop task stack (default 8 KB is too small once LVGL callbacks
;    allocate large spot buffers on the stack; 24 KB gives comfortable headroom)
  -DCONFIG_ARDUINO_LOOP_STACK_SIZE=24576

; ── Optimisation ─────────────────────────────────────────────────────
  -Os
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections

; ── Post-build script — emits named firmware/dxspotter-*.bin artifacts ─
extra_scripts =
  post:post_build.py

; ── Monitor ──────────────────────────────────────────────────────────
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, direct

; ── Lib deps ─────────────────────────────────────────────────────────
lib_deps =
  bodmer/TFT_eSPI@^2.5.34
  lvgl/lvgl@~8.3.4
  adafruit/Adafruit BusIO@^1.16
  bblanchon/ArduinoJson@^7.0
  links2004/WebSockets@^2.4.0

lib_ignore =
  lvgl/src/draw/sw/blend/helium
  lvgl/src/draw/arm2d
  lvgl/src/draw/nema_gfx
  lvgl/src/draw/nxp
  lvgl/src/draw/renesas
  lvgl/src/draw/sdl
  lvgl/src/draw/vg_lite_tvg
  lvgl/src/draw/dma2d
  lvgl/src/draw/eve
  lvgl/src/draw/nanovg
  lvgl/src/draw/opengles
  lvgl/src/draw/espressif

lib_dir = lib

; ── Upload ───────────────────────────────────────────────────────────
upload_speed = 921600
upload_port  =
