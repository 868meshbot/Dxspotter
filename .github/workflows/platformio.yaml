name: PlatformIO Build

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          ~/.piocache
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-

    - name: Build firmware
      run: |
        mkdir -p ~/.piocache
        export PLATFORMIO_BUILD_CACHE_DIR=~/.piocache
        pio run -e t-deck

    - name: Package firmware
      # Build the named app-only and merged binaries directly from the canonical
      # build outputs (which always exist after a successful build). The merge is
      # a pure-Python 0xFF-padded splice — no esptool/pyserial dependency, and no
      # reliance on the post_build.py post-action having fired.
      run: |
        BD=.pio/build/t-deck
        test -f "$BD/firmware.bin" || { echo "Build produced no firmware.bin"; exit 1; }
        VER=$(grep -oE 'DXS_VERSION[[:space:]]+"[^"]+"' src/version.h | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
        [ -n "$VER" ] || VER=0.0.0
        STEM="dxspotter-t-deck-plus-$VER"
        mkdir -p firmware
        cp "$BD/firmware.bin" "firmware/$STEM.bin"
        python - "$BD" "firmware/$STEM-merged.bin" <<'PY'
        import sys, os
        bd, out = sys.argv[1], sys.argv[2]
        imgs = [(0x0000, bd + "/bootloader.bin"),
                (0x8000, bd + "/partitions.bin"),
                (0x10000, bd + "/firmware.bin")]
        end = max(off + os.path.getsize(p) for off, p in imgs)
        blob = bytearray(b"\xff" * end)
        for off, p in imgs:
            with open(p, "rb") as f:
                blob[off:off + os.path.getsize(p)] = f.read()
        with open(out, "wb") as f:
            f.write(blob)
        print("merged %d bytes -> %s" % (end, out))
        PY
        ls -lh firmware/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-binaries
        path: firmware/dxspotter-*.bin

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ github.ref_name }}" \
          --title "${{ github.ref_name }}" \
          --generate-notes \
          firmware/dxspotter-*.bin
